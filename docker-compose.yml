services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Vite replaces these into the client bundle at build time.
        # Set them in a .env file next to this compose file, or export them.
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Server-side Supabase client reads the unprefixed variables
      - SUPABASE_URL=${VITE_SUPABASE_URL}
      - SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
      # Required for Lovable Cloud auth / OAuth and connector services
      - LOVABLE_API_KEY=${LOVABLE_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_interval: 5s
      start_period: 10s
